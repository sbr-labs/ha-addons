configuration:
  ps5_host:
    name: PS5 IP address
    description: LAN IP of your PS5 (Settings → Network → View Connection Status → IP Address). Example "192.168.1.50".
  account_id:
    name: PSN Account ID (Base64)
    description: Short Base64 string ending in '=' (e.g. "aBc1dEfg23h="). Get it from https://psn.flipscreen.games (public profiles) or use the built-in OAuth helper below (any profile, including private). Decimal form is also accepted — the add-on auto-converts to base64.
  oauth_redirect_url:
    name: OAuth redirect URL (helper only)
    description: Leave blank unless using the built-in OAuth helper. Start the add-on with this AND account_id both blank to print Sony's sign-in URL in the log; sign in; paste the FULL post-login redirect URL here; restart — the add-on prints your Account ID; clear this field and paste the Account ID into account_id.
  pin:
    name: 8-digit pairing PIN (one-time)
    description: Only needed once after account_id is set. Generate on the PS5 (Settings → System → Remote Play → Link Device) RIGHT BEFORE starting the add-on — PINs expire in ~5 min. After pairing succeeds, clear this field.
  home_image_url:
    name: Custom media-player image (optional)
    description: >-
      Picture shown on the Remote 3 media-player widget when the PS5 is on the home screen (no game running). LEAVE BLANK to use the built-in PS5 wordmark — most users want this. To use your own picture, paste a direct link to a PNG or JPG file. Must end in .png or .jpg (NOT .svg, NOT a webpage). Tip — right-click any image online → "Copy image address". Example "https://example.com/my-art.png". Save → Restart the add-on. New image appears on the Remote within ~10 seconds.
  psn_npsso_token:
    name: PSN npsso cookie (optional — for game cover art on the widget)
    description: >-
      One-time paste to enable real-time "currently playing" + game cover art on the Remote 3 media-player widget. Without this, the widget shows the home image only. To get your npsso — sign in to your PSN account in any browser, open https://ca.account.sony.com/api/v1/ssocookie, copy the long value of "npsso" from the JSON (just the value, not the curly braces or quotes). Paste it here, Save, Restart. The add-on exchanges it for permanent OAuth tokens stored in /data/psn_tokens.json — you only do this once. You can clear this field after the first successful start; the saved tokens are what's used going forward. If Sony invalidates the tokens (~2 months idle), paste a fresh npsso here to re-bootstrap.
  log_level:
    name: Log level
    description: Daemon log verbosity. Set DEBUG only for troubleshooting.
