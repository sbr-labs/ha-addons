name: PS5 Control
version: "0.4.16"
slug: ps5_control
description: PlayStation 5 control via Sony Remote Play. Exposes HTTP API on :8456 for the Unfolded Circle Remote 3, HA scripts, voice intents, etc. Includes built-in OAuth helper for getting your PSN Account ID without leaving HA.
url: https://github.com/sbr-labs/ha-addons
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
init: false
host_network: true
options:
  ps5_host: ""
  account_id: ""
  oauth_redirect_url: ""
  pin: ""
  log_level: INFO
schema:
  ps5_host: str
  account_id: str?
  oauth_redirect_url: str?
  pin: str?
  log_level: list(DEBUG|INFO|WARNING|ERROR)
